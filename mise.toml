# Pinned toolchain for this project (siehe scripts/setup-env.sh + AGENTS.md).
# `mise` + `direnv` activieren das automatisch beim Betreten des Repos
# (kein manuelles corepack/Global-Install mehr).
[tools]
node = "22"
pnpm = "11"

# Projekt-lokale CLI-Tools (vite, playwright, svelte-check, prettier, eslint,
# knip) aus node_modules/.bin direkt im PATH verfügbar machen, damit z.B.
# `vite` / `playwright` ohne `pnpm exec` in der Shell laufen. Greift nach
# `pnpm install` (dann existiert node_modules/.bin). $PWD wird von mise aus
# der Shell-Umgebung aufgelöst.
[env]
_.path = ["$PWD/node_modules/.bin"]
# Pro-Klon Ports (von scripts/init-local-ports.sh erzeugt, gitignored).
# Ermoeglicht mehrere geklonte Repos/Worker auf einem Host ohne
# Port-Kollision. Fallback auf Defaults, falls .ports.local.env fehlt.
_.file = { path = ".ports.local.env", type = "dotenv" }
RELAY_PORT = "{{env.RELAY_PORT or '8080'}}"
PORT = "{{env.PORT or '4173'}}"
