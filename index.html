		<script>
			// Display-Formeln (\[...\]) zentrieren sich per Default selbst - das
			// begrenzt text-align:left auf #numberPanel nicht. displayAlign muss vor
			// dem Laden des MathJax-Scripts gesetzt werden.
			window.MathJax = { chtml: { displayAlign: 'left' } };
		</script>
		<script
			id="MathJax-script"
			async
			src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"
		></script>
