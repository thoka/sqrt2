<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wurzel 2 - Area Model (Exact Integer Digit Math)</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script>
      // Display-Formeln (\[...\]) zentrieren sich per Default selbst - das
      // begrenzt text-align:left auf #numberPanel nicht (das array{l} richtet
      // nur INNERHALB der Formel aus). displayAlign muss vor dem Laden des
      // MathJax-Scripts gesetzt werden.
      window.MathJax = { chtml: { displayAlign: 'left' } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: system-ui, sans-serif; background: #0b1120; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }

        #numberPanel {
            position: fixed; top: 24px; right: 150px; z-index: 10; pointer-events: none; width: 700px;
            color: #94a3b8; font-size: 1.6em; line-height: 1.6; text-align: left;
        }
        #numberPanelInner {
            display: inline-block; transform-origin: left top;
        }
        #bankPanel {
            position: fixed; top: 0; bottom: 0; right: 20px; z-index: 10; pointer-events: none;
            width: 150px; display: flex; flex-direction: column; justify-content: center;
        }
        #bankPanelInner {
            display: flex; flex-direction: column; gap: 5px; transform-origin: right center;
        }

        .bank-row { display: flex; align-items: center; gap: 8px; font-family: monospace; }
        .bank-bar { flex-grow: 1; display: flex; justify-content: flex-end; align-items: center; gap: 2px; height: 24px; overflow: hidden; }
        .bank-exp { width: 24px; text-align: right; font-weight: bold; font-size: 1.95em; flex-shrink: 0; }

        #settingsPanel {
            position: fixed; top: 20px; right: 20px; width: 400px;
            max-height: calc(100vh - 40px); overflow-y: auto; z-index: 20;
            opacity: 0; transform: translateY(-8px) scale(0.98); pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease;
        }
        #settingsPanel.open { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }

        #bottomBar {
            position: fixed; left: 0; right: 0; bottom: 0; z-index: 20;
            display: flex; align-items: center; gap: 14px;
            padding: 10px 20px; pointer-events: none;
        }
        #bottomBar #playBtn {
            opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
            background: none; border: none; color: #f8fafc; font-size: 1.3em; cursor: pointer;
            width: 32px; height: 32px; flex-shrink: 0; padding: 0;
            display: flex; align-items: center; justify-content: center;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }
        #bottomBar #timeReadout {
            opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
            color: #cbd5e1; font-family: monospace; font-size: 0.85em; flex-shrink: 0;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8); white-space: nowrap;
        }
        #bottomBar.visible #playBtn, #bottomBar.visible #timeReadout { opacity: 1; pointer-events: auto; }
        #bottomBar #playBtn:hover { color: #3b82f6; }

        #timeSlider {
            flex-grow: 1; width: auto; border: none; -webkit-appearance: none; appearance: none;
            height: 3px; border-radius: 2px; background-color: rgba(255,255,255,0.25);
            background-clip: content-box; outline: none; cursor: pointer; pointer-events: auto;
            padding: 10px 0; box-sizing: content-box;
        }
        #timeSlider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%;
            background: #fff; opacity: 0; transition: opacity 0.2s ease; cursor: pointer;
        }
        #timeSlider::-moz-range-thumb {
            width: 12px; height: 12px; border-radius: 50%; border: none;
            background: #fff; opacity: 0; transition: opacity 0.2s ease; cursor: pointer;
        }
        #timeSlider::-moz-range-track { height: 3px; border-radius: 2px; background: transparent; }
        #bottomBar.visible #timeSlider::-webkit-slider-thumb,
        #bottomBar.visible #timeSlider::-moz-range-thumb { opacity: 1; }

        .overlay-panel {
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
            color: #f8fafc; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            pointer-events: auto; box-sizing: border-box; width: 100%; position: relative;
        }
        
        .piece-block { width: 15px; height: 20px; border-radius: 3px; flex-shrink: 0; }

        .control-group { display: flex; flex-direction: column; gap: 8px; font-size: 0.9em; margin-bottom: 5px;}
        .control-row { display: flex; gap: 10px; }
        .control-row > div { flex: 1; }
        input[type=range], input[type=number], select { width: 100%; cursor: pointer; background: #1e293b; color: #fff; border: 1px solid #334155; border-radius: 4px; padding: 6px; box-sizing: border-box;}

        .settings-btn {
            width: 100%; cursor: pointer; background: #1e293b; color: #fff; border: 1px solid #334155;
            border-radius: 4px; padding: 8px 6px; box-sizing: border-box; font-size: 0.85em; transition: background 0.15s ease;
        }
        .settings-btn:hover { background: #334155; }
        .settings-btn.copied { background: #06d6a0; color: #0b1120; border-color: #06d6a0; }
        
        .warning { color: #f59e0b; font-size: 0.8em; margin-top: -5px; }
        .error-msg { color: #ef476f; font-weight: bold; font-size: 0.9em; display: none; }
        .zoom-readout { color: #3b82f6; font-weight: bold; }

        .slider-with-marker { position: relative; }
        .auto-zoom-marker {
            position: absolute; top: 0; bottom: 0; width: 3px; margin-left: -1.5px;
            background: #f59e0b; border-radius: 2px; pointer-events: none; display: none;
        }
        .auto-zoom-note { color: #f59e0b; font-size: 0.8em; margin-top: -4px; display: none; }
    </style>
</head>
<body>

<canvas id="glCanvas"></canvas>

<div id="numberPanel"><div id="numberPanelInner"></div></div>
<div id="bankPanel"><div id="bankPanelInner"></div></div>

<div class="overlay-panel" id="settingsPanel">
    <div style="font-weight: bold; margin-bottom: 5px; color: #3b82f6;">System-Compiler</div>
    <div class="control-row">
        <div class="control-group"><label>Basis (b)</label><input type="number" id="baseInput" min="2" max="16" value="10"></div>
        <div class="control-group"><label>Tiefe ($n_{max}$)</label><input type="number" id="depthInput" min="1" max="100" value="16"></div>
    </div>
    <div class="warning" id="perfWarning">Tiefe > 5 kann Leistung beeinträchtigen.</div>
    <div class="error-msg" id="errorMsg"></div>

    <div class="control-group" style="margin-top: 5px;">
        <label>Transformation (Flug-Modus)</label>
        <select id="transformMode">
            <option value="S">S: Strecken (Morphing)</option>
            <option value="Z">Z: Zerschneiden (Montessori) - Rück-Verschmelzung noch buggy</option>
            <!-- R (Rotieren) weiterhin deaktiviert - eigener, unabhängiger
                 Bug (falsche Zielgröße bei R_macro), siehe README
                 Abschnitt 8. Für Neuimplementierung siehe Kommentare im JS. -->
        </select>
    </div>

    <hr style="border: 1px solid #334155; margin: 10px 0;">

    <div class="control-group"><label id="tickLabel">Tick (Vergleich mit Test-Tool) — 0 / 0</label><input type="number" id="tickInput" min="0" step="1" value="0"></div>

    <div class="control-group" style="margin-top:10px;">
        <label>Modus B (Hypothetische Basis $b \to 1$)</label>
        <div class="slider-with-marker">
            <input type="range" id="modeSliderAB" min="0" max="1" step="0.01" value="0">
            <div class="auto-zoom-marker" id="autoZoomMarker" title="Auto-Zoom-Mindestwert"></div>
        </div>
        <div class="auto-zoom-note" id="autoZoomNote">Auto-Zoom aktiv - übersteuert den Regler nach oben</div>
    </div>
    <div class="control-group" style="margin-top:6px;">
        <label>Auto-Zoom: Mindestbreite feinste Stelle (Pixel, 0 = aus)</label>
        <input type="number" id="autoZoomMinPxInput" min="0" max="200" step="1" value="3">
    </div>

    <div class="control-group" style="margin-top:10px;">
        <label>Bank-Zoom (automatisch, reale Basis) — <span class="zoom-readout" id="bankZoomLabel">1,0×</span></label>
        <label style="margin-top:-4px;">Restfläche der Bank — <span class="zoom-readout" id="bankAreaLabel">100%</span></label>
    </div>
    <div class="control-group" style="margin-top:6px;">
        <label>Zoom-Schwellwert (Potenzen ignorieren)</label>
        <input type="number" id="zoomThresholdInput" min="0" max="10" step="1" value="0">
    </div>
    <div class="control-group" style="margin-top:6px; flex-direction: row; align-items: center; gap: 8px;">
        <input type="checkbox" id="compactionEnabledInput" style="width: auto;">
        <label style="margin: 0;" for="compactionEnabledInput">Kompaktierung ("Zeilen/Spalten ausblenden") statt Bank-Zoom</label>
    </div>

    <hr style="border: 1px solid #334155; margin: 10px 0;">

    <!-- Auskommentiert: Linienbreite allein (0.3px) reicht bereits für
    ein komplett ruhiges Bild - Supersampling und Blur bringen dann keinen
    spürbaren Zusatznutzen mehr. Code bleibt für späteren Bedarf erhalten.
    <div class="control-group">
        <label>Render-Auflösung (Supersampling gegen Flirren, kostet Performance) — <span class="zoom-readout" id="renderScaleLabel">1,0×</span></label>
        <input type="range" id="renderScaleInput" min="0.5" max="3" step="0.1" value="1">
    </div>
    <div class="control-group" style="margin-top:6px;">
        <label>Kantenweichheit (Blur gegen Flirren) — <span class="zoom-readout" id="edgeBlurLabel">0px</span></label>
        <input type="range" id="edgeBlurInput" min="0" max="2" step="0.1" value="0">
    </div>
    -->
    <div class="control-group" style="margin-top:6px;">
        <label>Linienbreite (dicker = weniger Flirren, kaum Performance-Kosten) — <span class="zoom-readout" id="lineWidthLabel">0,3px</span></label>
        <input type="range" id="lineWidthInput" min="0" max="4" step="0.1" value="0.3">
    </div>

    <hr style="border: 1px solid #334155; margin: 10px 0;">

    <div class="control-group">
        <label>Wiedergabe: Wartezeit an Anfang &amp; Ende (Sekunden)</label>
        <input type="number" id="pauseDurationInput" min="0" max="10" step="0.1" value="1.5">
    </div>

    <hr style="border: 1px solid #334155; margin: 10px 0;">

    <div class="control-group">
        <label>Aktuellen Zustand teilen (kopiert in die Zwischenablage)</label>
        <div class="control-row">
            <button type="button" class="settings-btn" id="copyUrlBtn">Als URL kopieren</button>
            <button type="button" class="settings-btn" id="copyParamsBtn">Nur Parameter kopieren</button>
        </div>
    </div>
</div>

<div id="bottomBar">
    <button id="playBtn" title="Play/Pause">▶</button>
    <input type="range" id="timeSlider" min="0" max="10" step="0.01" value="0">
    <span id="timeReadout">0.0 · 0/0</span>
</div>

<script type="module">
import { buildSystem, buildTickTimeMapping, computeCompactionWaypoints, makeCompactedRectLookup } from './bank-core.js';
import { buildMonotoneSpline, buildDampedFilterBundle, buildDampedFilter } from './smoothing.js';

const COLORS = ["#cbd5e1", "#ef476f", "#ffd166", "#06d6a0", "#118ab2", "#8338ec", "#f78c6b", "#ff006e", "#3a86ff", "#fb5607", "#ffbe0b"];
// Schaltet die Wort-Präfixe ("Länge ", "Fläche ", "Rest ") im Zahlen-Panel
// oben rechts an/aus - Standard aus (nur kurze Symbole l/l²/R).
const NUMBER_PANEL_VERBOSE = false;

// === URL-Parameter: Einstellungen (für Tests/Links) ===
// Werden GANZ AM ANFANG direkt auf die zugehörigen <input>/<select>-Elemente
// geschrieben (roher DOM-Zugriff über getElementById, ohne auf die weiter
// unten deklarierten JS-Konstanten zu warten) - jeder spätere Code, der
// .value von diesen Elementen liest (compileSystem(), die Init-Blöcke von
// lineWidthInput/pauseDurationInput/autoZoomMinPxInput weiter unten, ...),
// bekommt den überschriebenen Wert dadurch automatisch, ohne eigene
// Sonderbehandlung. Wiedergabe-Position (time/tick) und Modus-B-Regler
// (modeab) hängen dagegen von der erst noch zu kompilierenden Simulation ab
// (MAX_TIME/GLOBAL_TTM) und werden daher separat, NACH compileSystem() am
// Ende dieses Scripts angewendet (siehe dort). Das Gegenstück (Button "Als
// URL kopieren") baut denselben Parameter-Satz, siehe buildStateParams().
const URL_PARAMS = new URLSearchParams(window.location.search);
const URL_FIELD_MAP = {
    base: 'baseInput', depth: 'depthInput', mode: 'transformMode',
    zoomthresh: 'zoomThresholdInput', autozoom: 'autoZoomMinPxInput',
    linewidth: 'lineWidthInput', pause: 'pauseDurationInput',
};
for (let param in URL_FIELD_MAP) {
    if (URL_PARAMS.has(param)) {
        let el = document.getElementById(URL_FIELD_MAP[param]);
        if (el) el.value = URL_PARAMS.get(param);
    }
}
// Checkboxen brauchen .checked statt .value - eigene, kleine Zuordnung
// statt URL_FIELD_MAP mit Sonderfällen zu verunreinigen.
const URL_CHECKBOX_FIELD_MAP = { compaction: 'compactionEnabledInput' };
for (let param in URL_CHECKBOX_FIELD_MAP) {
    if (URL_PARAMS.has(param)) {
        let el = document.getElementById(URL_CHECKBOX_FIELD_MAP[param]);
        if (el) el.checked = URL_PARAMS.get(param) === '1';
    }
}

let N_MAX = 16; let BASE = 10;
let TOTAL_STEPS = 0; let MAX_TIME = 0; let P_FINAL = 0;
let render_pipeline = []; let bank_pieces = []; let axes = [];

// Speichert die Ziffern für die exakte BigInt-Ausgabe
let GLOBAL_N_ARR = []; 
// Speichert, zu welchem Zeitpunkt Schale S beginnt (ersetzt die alte
// Annahme "Schale S beginnt bei Zeit S*3.0", die nicht mehr gilt,
// seit die Zeitachse monoton statt in festen Bloecken laeuft)
let GLOBAL_SHELL_START = [];
// Speichert pro Schale S den Auto-Zoom-Zustand der Bank ({z, cx, cy}) -
// einmal berechnet in compileSystem(), zwischen den Schalen wird zur
// Laufzeit stetig interpoliert (siehe getInterpolatedBankZoom()).
let GLOBAL_BANK_ZOOM = [];
// Feine Checkpoint-Zeitpunkte (ein Eintrag pro Entnahme-Ereignis, nicht nur
// pro Schale) - Basis für GLOBAL_BANK_ZOOM, siehe compileSystem().
let GLOBAL_BANK_ZOOM_TIMES = [];
// Aus GLOBAL_BANK_ZOOM/GLOBAL_BANK_ZOOM_TIMES gebaute Glättungs-Splines
// (siehe smoothing.js) - einmal pro compileSystem(), von getBankTransform()
// nur noch ausgewertet.
let GLOBAL_BANK_ZOOM_SPLINE = null;
// Zoom-Schwellwert (in Potenzen von BASE): 0 = alle Stücke fließen ins
// Framing ein (bisheriges Verhalten). Siehe compileSystem() für Details.
let BANK_ZOOM_THRESHOLD_POWERS = 0;
// Bijektive Tick<->Zeit-Abbildung aus compileSystem() (siehe dort) - wird
// hier zusätzlich aufgehoben, damit der Tick-Regler (siehe unten) jederzeit
// zwischen der kontinuierlichen Animationszeit dieses Tools und dem
// ganzzahligen Tick-Zähler aus bank-core.js hin- und herrechnen kann. Das
// erlaubt den direkten Zustandsvergleich mit dem Test-Tool (dort ist Tick
// die native Zeitachse).
let GLOBAL_TTM = null;
// Auto-Zoom braucht während der Animation ein bewegliches Ziel: der
// Exponent der tiefsten gerade sichtbaren Ziffern-Stelle wächst schalenweise
// (axes[S].exp), nicht erst fix bei N_MAX. Ein Eintrag pro Schale S
// ({t: Schalen-Startzeit, exp: axes[S].exp}) - Rohdaten für die Glättung in
// getSmoothedAutoZoomExp() (Muster identisch zu
// GLOBAL_BANK_ZOOM/getBankTransform() weiter unten).
let GLOBAL_AUTO_ZOOM_CHECKPOINTS = [];
// Aus GLOBAL_AUTO_ZOOM_CHECKPOINTS gebaute Glättungs-Spline (siehe
// smoothing.js) - einmal pro compileSystem(), von getSmoothedAutoZoomExp()
// nur noch ausgewertet.
let GLOBAL_AUTO_ZOOM_SPLINE = null;
// Kompaktierung ("Zeilen/Spalten ausblenden", siehe bank-core.js TEIL 2 und
// README Abschnitt 6.2/11) - analog zum Algorithmus-Spiel-Tool, hier fürs
// Haupttool ergänzt. Nur berechnet, wenn COMPACTION_ENABLED aktiv ist (nicht
// kostenlos bei tiefer Rekursion, siehe makeCompactedRectLookup-Kommentar
// in bank-core.js). GLOBAL_COMPACTION_LOOKUP cacht pro Stück, GLOBAL_
// COMPACTION_ZOOM_SPLINE ist nur fürs Zoom-Readout (bankZoomLabel).
let COMPACTION_ENABLED = false;
let GLOBAL_COMPACTION_WAYPOINTS = [];
let GLOBAL_COMPACTION_LOOKUP = null;
let GLOBAL_COMPACTION_ZOOM_SPLINE = null;

// === SYSTEM A: COMPILER ===
//
// Ziffernsuche und Bank-Algorithmus (Auswahl "isolation" + Schneiden
// "centroid_far" + Streifen-Enden-Filter) kommen aus bank-core.js - derselben
// Datei, die auch das Algorithmus-Spiel-Tool (selection_strategy_prototype.html)
// nutzt. Beide Tools verhalten sich damit garantiert identisch. bank-core.js
// zählt intern nur einen monotonen Tick (1 Tick = 1 Entnahme); die Brücke zur
// kontinuierlichen Animationszeit dieses Tools liefert buildTickTimeMapping()
// weiter unten (siehe Abschnitt 6.3 im README).

function compileSystem() {
    try {
        document.getElementById('errorMsg').style.display = 'none';
        N_MAX = parseInt(document.getElementById('depthInput').value);
        BASE = parseInt(document.getElementById('baseInput').value);
        BANK_ZOOM_THRESHOLD_POWERS = parseInt(document.getElementById('zoomThresholdInput').value) || 0;
        let transformMode = document.getElementById('transformMode').value;
        document.getElementById('perfWarning').style.display = N_MAX > 5 ? 'block' : 'none';

        // Beste validierte Kombination fest einprogrammiert (siehe README) -
        // das Haupttool bietet dafür bewusst keine eigene Auswahl an (nur
        // den Flug-Modus, siehe unten). Die Schalen-Konstruktion selbst
        // (welche/wie viele Stücke pro Gitterzelle) kommt jetzt ebenfalls
        // aus bank-core.js (buildSystem) - gemeinsam mit dem Test-Tool
        // genutzt, statt einer eigenen Kopie der Schalen-Schleife hier.
        // cellMode 'morph' (S: Strecken) nimmt ein Stück direkt, 'subdivide'
        // (Z: Zerschneiden) BASE Stücke der nächsten Ebene pro Rand-Zelle -
        // siehe bank-core.js für Details.
        let cellMode = transformMode === 'Z' ? 'subdivide' : 'morph';
        let { sim, events } = buildSystem(BASE, N_MAX, 'fixed', cellMode);
        axes = sim.axes;
        TOTAL_STEPS = sim.TOTAL_STEPS;
        bank_pieces = sim.bank_pieces;

        // n_arr[m] (Ziffer an Stelle m) ergibt sich direkt aus der Anzahl der
        // axes-Einträge mit exp===m - genau so hat bank-core.js sie erzeugt.
        let n_arr = new Array(N_MAX + 1).fill(0);
        for (let a of axes) n_arr[a.exp]++;
        GLOBAL_N_ARR = n_arr;

        // P_FINAL = Summe aller Achsen-Breiten (b^-exp) inkl. des Basisquadrats
        // (exp=0) - exakt der Wert, den axes[axes.length-1].cumulative früher lieferte.
        P_FINAL = axes.reduce((sum, a) => sum + Math.pow(BASE, -a.exp), 0);

        render_pipeline = [];
        let tickTimePairs = [];
        let global_time = 1.0;
        let local_max_time = 1.0;

        // PATCH V28b: Bugfix "Bank ist leer" bei größerer Tiefe.
        // Vorher wurde global_time zu Beginn jeder Schale S hart auf S*3.0
        // zurueckgesetzt. Eine Schale hat aber (2*S+1) Stuecke, die je 0.15
        // Zeiteinheiten verbrauchen. Sobald (2*S+1)*0.15 > 3.0 ist (ab S~10),
        // lief die Zeit ueber das naechste Reset-Ziel hinaus - der naechste
        // Reset sprang dann RUECKWAERTS in der Zeit. Ausserdem braucht
        // buildTickTimeMapping() weiter unten monoton wachsende t_fly-Werte,
        // um Tick <-> Zeit eindeutig umzurechnen - ein Zeitsprung rueckwaerts
        // wuerde diese Abbildung brechen.
        //
        // Fix: kein absolutes Reset mehr, sondern ein garantiert positiver
        // Abstand ("gap") zum tatsaechlichen Ende der vorherigen Schale.
        // Damit ist global_time global monoton steigend, unabhaengig davon
        // wie viele Stuecke eine Schale enthaelt.
        const SHELL_GAP = 1.0;
        let shell_start_time = new Array(TOTAL_STEPS).fill(0);

        // events (aus bank-core.js buildSystem) sind bereits in der exakten
        // Entnahme-Reihenfolge sortiert. Eine Rand-Zelle im Zerschneiden-
        // Modus erscheint als `count` aufeinanderfolgende Events mit
        // derselben Gitterposition (u,v) - diese werden hier zu EINER
        // Zerschneiden-Gruppe (Z_source/Z_ghost/Z_micro) zusammengefasst,
        // die anderen (count===1) direkt zu S_macro/Z_direct.
        let lastS = 0;
        let idx = 0;
        while (idx < events.length) {
            let e = events[idx];
            let S = Math.max(e.u, e.v);
            if (S !== lastS) {
                global_time += SHELL_GAP;
                shell_start_time[S] = global_time;
                lastS = S;
            }

            if (e.count === 1) {
                let t_fly = global_time;
                tickTimePairs.push({ tick: e.tick, time: t_fly });
                if (e.is_top) {
                    render_pipeline.push({ type: 'S_macro', bp: e.piece, u: e.u, v: e.v, time_fly: t_fly });
                } else {
                    render_pipeline.push({ type: 'Z_direct', bp: e.piece, u: e.u, v: e.v, time_fly: t_fly });
                }
                local_max_time = Math.max(local_max_time, t_fly + 1.0);
                global_time += 0.15;
                idx++;
            } else {
                // Zerschneiden-Gruppe: das ganze Elternstück wird sichtbar
                // "aufgeschnitten" (Z_source -> Z_micro) und beim
                // Zurückspulen wieder "verschmolzen" (Z_ghost). BEKANNTER
                // OFFENER BUG (siehe README Abschnitt 8): die Rück-
                // Verschmelzung ist noch nicht vollständig animiert/verifiziert
                // - absichtlich noch nicht weiter gefixt, siehe Gespräch.
                let group = events.slice(idx, idx + e.count);
                let t_cut = global_time - 0.5;
                let t_fly = global_time;
                let t_fuse = global_time + 1.0;
                let parent_bp = bank_pieces.find(p => p.id === group[0].piece.parent_id);
                render_pipeline.push({ type: 'Z_source', bp: parent_bp, u: e.u, v: e.v, time_cut: t_cut });
                render_pipeline.push({ type: 'Z_ghost', bp: parent_bp, u: e.u, v: e.v, time_fuse: t_fuse });
                for (let g of group) {
                    tickTimePairs.push({ tick: g.tick, time: t_cut });
                    render_pipeline.push({ type: 'Z_micro', bp: g.piece, u: e.u, v: e.v, i: g.i, time_cut: t_cut, time_fly: t_fly, time_fuse: t_fuse });
                }
                local_max_time = Math.max(local_max_time, t_fuse + 0.5);
                global_time += 0.15;
                idx += e.count;
            }
        }

        // bank-core.js zählt Entnahmen nur als monotonen Integer-Tick (siehe
        // Kommentar oben in bank-core.js, TEIL 3). Die bijektive Abbildung
        // übersetzt jeden Tick zurück in die kontinuierliche Animationszeit
        // dieses Tools; ein kleiner Versatz auf cut_time/born_time reproduziert
        // den alten Vorlauf ("Stück ist schon sichtbar geschnitten, bevor es
        // fliegt"). WICHTIG: dieser Versatz muss strikt kleiner sein als der
        // kleinstmögliche Abstand zwischen zwei aufeinanderfolgenden Ticks
        // (0.15, siehe global_time-Inkremente oben) - sonst kann ein Schnitt-
        // Ereignis aus einem SPÄTEREN Tick durch den Versatz vor die
        // Entnahme eines NAHEN, aber früheren Ticks rutschen und die
        // Sichtbarkeits-Reihenfolge verfälschen (führte zu Bank-Zuständen,
        // die vom Test-Tool bei gleichem Tick abwichen - mit 0.4 empirisch
        // an vielen Ticks reproduzierbar, mit 0.1 an keinem einzigen mehr).
        const CUT_BORN_LEAD = 0.1;
        let ttm = buildTickTimeMapping(tickTimePairs);
        for (let p of bank_pieces) {
            p.taken_time = isFinite(p.taken_time) ? ttm.tickToTime(p.taken_time) : Infinity;
            p.cut_time = isFinite(p.cut_time) ? ttm.tickToTime(p.cut_time) - CUT_BORN_LEAD : Infinity;
            p.born_time = p.born_time === 0 ? 0 : ttm.tickToTime(p.born_time) - CUT_BORN_LEAD;
        }
        GLOBAL_TTM = ttm;
        tickInput.max = ttm.maxTick;

        GLOBAL_SHELL_START = shell_start_time;

        // Auto-Zoom-Ziel (Ziel-Seite): pro Schale S der Exponent der tiefsten
        // in dieser Schale neu sichtbaren Ziffern-Stelle - wächst mit der
        // Animation von 0 (nur Basisquadrat) bis N_MAX, nicht von Anfang an
        // fix auf N_MAX. Siehe getSmoothedAutoZoomExp() weiter unten.
        //
        // Nutzt buildMonotoneSpline() (siehe smoothing.js) statt eines
        // kausalen Filters: die Kurve trifft an JEDEM Checkpoint GENAU den
        // dortigen Exponenten - kein Nachhinken mehr, das (frühere Version)
        // erst per künstlichem Zeitvorlauf UND einer zusätzlichen "harten"
        // Sicherheits-Kopie in renderFrame() kompensiert werden musste. Für
        // eine monoton wachsende Stützpunkt-Folge bleibt die Spline
        // zwischen zwei Checkpoints garantiert innerhalb von deren Werten
        // (Monotonie-Erhalt, siehe smoothing.js) - das allein reicht bereits
        // als Sichtbarkeits-Garantie, siehe smoothing.test.js.
        //
        // { onlyChanges: true }: axes[S].exp wiederholt sich über mehrere
        // Schalen hinweg (bei Basis 10/Tiefe 16 sind nur 15 von 56 Schalen
        // echte Wertwechsel, siehe Gesprächsverlauf) - ohne diese Option
        // erzwingt jeder Wiederholungspunkt eine Nulltangente (siehe
        // smoothing.js), was jeden Wertwechsel zu einer isolierten Mini-
        // Rampe zwischen "toten" Haltepunkten macht ("weiche Stufen" statt
        // durchgehender Bewegung). Die Sichtbarkeits-Garantie bleibt dabei
        // erhalten (siehe smoothing.test.js/auto-zoom-visibility.test.js).
        GLOBAL_AUTO_ZOOM_CHECKPOINTS = [];
        for (let S = 0; S < TOTAL_STEPS; S++) {
            GLOBAL_AUTO_ZOOM_CHECKPOINTS.push({ t: shell_start_time[S], exp: axes[S].exp });
        }
        GLOBAL_AUTO_ZOOM_SPLINE = buildMonotoneSpline(
            GLOBAL_AUTO_ZOOM_CHECKPOINTS.map(c => ({ t: c.t, v: c.exp })),
            { onlyChanges: true }
        );

        // PATCH V32: Auto-Zoom für die Bank - grundlegend überarbeitet.
        //
        // Vorherige Version (festes Zentrum 0.5/0.5) blieb hängen, weil der
        // Rest sich systematisch zu einer Seite hin verlagert (Entnahme
        // bevorzugt niedrige x/y, Zerschneiden bevorzugt hohe x/y) - er liegt
        // fast nie zentriert im Einheitsquadrat. Ein festes Zentrum verlangt
        // dann fälschlich Platz bis zum GEGENÜBERLIEGENDEN Rand, obwohl die
        // Box selbst längst geschrumpft ist.
        //
        // Neu: Zentrum und Zoom werden pro Checkpoint aus der ECHTEN
        // Bounding-Box (samt ihres eigenen Mittelpunkts) berechnet - das
        // Zentrum wandert also mit. Damit eine Überblendung zwischen zwei
        // verschiedenen Zentren dennoch garantiert sicher bleibt, wird NICHT
        // (wie zuvor) zwischen den Zoom-PARAMETERN interpoliert, sondern
        // zwischen den fertig transformierten BILDSCHIRM-POSITIONEN
        // (siehe getBankTransformed() weiter unten): Für einen Punkt, der
        // während des Übergangs sichtbar ist, liegt sowohl die alte als auch
        // die neue Position nachweislich in [0,1] (Box-Schachtelung: die Box
        // schrumpft monoton, jeder später sichtbare Punkt war Teil jeder
        // früheren Box). Da [0,1] konvex ist, liegt JEDE gewichtete Mischung
        // dieser zwei sicheren Positionen ebenfalls in [0,1] - unabhängig
        // davon, wie stark sich das Zentrum zwischen den Checkpoints
        // verschiebt. Das ist mathematisch immer sicher, nicht nur im
        // statistischen Mittel.
        //
        // Checkpoints werden aus den tatsächlichen Entnahme-Zeitpunkten
        // gewonnen (viel feinkörniger als "einmal pro Schale"), damit der
        // Zoom nicht in großen Sprüngen, sondern in vielen kleinen, stetigen
        // Schritten wächst. Bei sehr tiefer Rekursion wird auf eine
        // Obergrenze heruntergesampelt, um die Kompilierzeit zu begrenzen.
        // PATCH V39: Kein Sicherheitsrand mehr (war 0.2) - damit ist der
        // Zoom beim Startzustand (volles [0,1]-Quadrat) exakt 1.0 statt
        // 0.83. Da der Zoom nachweislich monoton wächst, ist 1.0 damit der
        // garantierte MINIMALE Zoom über die gesamte Laufzeit.
        const ZOOM_MARGIN = 0;
        const MAX_CHECKPOINTS = 400;

        let eventTimesSet = new Set([0]);
        for (let p of bank_pieces) { if (isFinite(p.taken_time)) eventTimesSet.add(p.taken_time); }
        eventTimesSet.add(local_max_time);
        let eventTimes = Array.from(eventTimesSet).sort((a, b) => a - b);
        if (eventTimes.length > MAX_CHECKPOINTS) {
            let sampled = [];
            for (let i = 0; i < MAX_CHECKPOINTS; i++) {
                sampled.push(eventTimes[Math.floor(i * (eventTimes.length - 1) / (MAX_CHECKPOINTS - 1))]);
            }
            eventTimes = Array.from(new Set(sampled));
        }

        // PATCH V35: Zoom-Schwellwert aus dem Algorithmus-Spiel-Tool
        // übernommen. Stücke, die mehr als BANK_ZOOM_THRESHOLD_POWERS
        // Potenzen von BASE kleiner sind als das größte gerade sichtbare
        // Stück, fließen NICHT ins Zoom-Framing ein (werden aber weiter
        // gezeichnet) - verhindert, dass ein einzelner winziger Einzelgänger
        // den Zoom aufhält und die Ansicht "unverständlich" wirken lässt.
        const kThresholdDiff = 2 * BANK_ZOOM_THRESHOLD_POWERS;
        let bank_zoom_states = new Array(eventTimes.length);
        for (let i = 0; i < eventTimes.length; i++) {
            let t = eventTimes[i];
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity, found = false;
            let area = 0;
            let visibleNow = bank_pieces.filter(p => t >= p.born_time && t < p.cut_time && t < p.taken_time);
            let kMin = visibleNow.length > 0 ? Math.min(...visibleNow.map(p => p.k)) : 0;
            for (let p of visibleNow) {
                area += p.w * p.h; // Fläche zählt IMMER, auch für ausgeblendete (nur fürs Framing irrelevant)
                if (BANK_ZOOM_THRESHOLD_POWERS > 0 && p.k > kMin + kThresholdDiff) continue;
                found = true;
                if (p.x < minX) minX = p.x;
                if (p.x + p.w > maxX) maxX = p.x + p.w;
                if (p.y < minY) minY = p.y;
                if (p.y + p.h > maxY) maxY = p.y + p.h;
            }
            if (!found) { minX = 0; maxX = 1; minY = 0; maxY = 1; area = 1; }
            let cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
            let halfW = Math.max((maxX - minX) / 2, 1e-9) * (1 + ZOOM_MARGIN);
            let halfH = Math.max((maxY - minY) / 2, 1e-9) * (1 + ZOOM_MARGIN);
            let z = Math.min(0.5 / halfW, 0.5 / halfH);
            let offsetX = 0.5 - cx * z, offsetY = 0.5 - cy * z;
            bank_zoom_states[i] = { z, cx, cy, offsetX, offsetY, area };
        }
        GLOBAL_BANK_ZOOM_TIMES = eventTimes;
        GLOBAL_BANK_ZOOM = bank_zoom_states;
        // buildDampedFilterBundle() statt buildMonotoneSplineBundle(): der
        // Bank-Zoom hat bis zu MAX_CHECKPOINTS=400 dicht getaktete Wegpunkte
        // (oft nur einen Tick auseinander, ein Wegpunkt pro Entnahme) - eine
        // exakte Spline reagiert auf JEDEN davon sofort, was sich als
        // unruhige/zappelige Bewegung zeigt (Regression, siehe
        // Gesprächsverlauf). Der Bank-Zoom BRAUCHT diese Exaktheit auch gar
        // nicht: sein Sicherheitsbeweis ("Konvexkombination bereits sicherer
        // Positionen bleibt sicher") gilt für JEDE Zeitkonstante TAU, siehe
        // README Abschnitt 6.1 - anders als beim Auto-Zoom-Exponenten
        // (dort MUSS jeder Wegpunkt exakt getroffen werden, siehe
        // getSmoothedAutoZoomExp() weiter unten).
        const BANK_ZOOM_TAU = Math.max(local_max_time * 0.03, 0.5);
        GLOBAL_BANK_ZOOM_SPLINE = buildDampedFilterBundle(
            eventTimes.map((t, i) => ({ t, ...bank_zoom_states[i] })),
            ['z', 'offsetX', 'offsetY', 'area'],
            BANK_ZOOM_TAU
        );

        // Kompaktierung ("Zeilen/Spalten ausblenden", siehe bank-core.js
        // TEIL 2) - nur berechnet, wenn die Einstellung aktiv ist (nicht
        // kostenlos bei tiefer Rekursion). Ersetzt bei aktiver Kompaktierung
        // den obigen bankT-basierten Auto-Zoom für die Bank-Darstellung
        // vollständig (siehe project() in renderFrame()) - beide Modi sind
        // bewusst gegenseitig exklusiv, analog zum Algorithmus-Spiel-Tool.
        COMPACTION_ENABLED = document.getElementById('compactionEnabledInput').checked;
        if (COMPACTION_ENABLED) {
            GLOBAL_COMPACTION_WAYPOINTS = computeCompactionWaypoints(bank_pieces, local_max_time);
            GLOBAL_COMPACTION_LOOKUP = makeCompactedRectLookup(GLOBAL_COMPACTION_WAYPOINTS);
            // Nur das Zoom-Faktor-TEXT-Readout (bankZoomLabel) - NICHT
            // GLOBAL_COMPACTION_LOOKUP (die tatsächlichen Stück-Positionen):
            // die brauchen weiterhin computeSegmentBlend()s exakte,
            // geteilte Gewichte für die Nichtüberlappungs-Garantie (siehe
            // Abschnitt 6.2) - nur die Zahlenanzeige darf/soll träger sein.
            GLOBAL_COMPACTION_ZOOM_SPLINE = buildDampedFilter(GLOBAL_COMPACTION_WAYPOINTS.map(wp => ({ t: wp.t, v: wp.z })), Math.max(local_max_time * 0.03, 0.5));
        } else {
            GLOBAL_COMPACTION_WAYPOINTS = [];
            GLOBAL_COMPACTION_LOOKUP = null;
            GLOBAL_COMPACTION_ZOOM_SPLINE = null;
        }

        MAX_TIME = local_max_time;
        document.getElementById('timeSlider').max = MAX_TIME;
        u_time = 0; document.getElementById('timeSlider').value = 0;
        updateOutputs(); 
    } catch(e) {
        document.getElementById('errorMsg').style.display = 'block';
        document.getElementById('errorMsg').innerText = `Compiler-Absturz: ${e}`;
        isPlaying = false;
    }
}

// === SYSTEM B: DYNAMIC LAYOUT & HUD ===
let DYN_TARGET_W = 1.0; let dyn_prefA = []; let dyn_axes_w = [];
let _lastLayoutT_AB = null;

function updateDynamicLayout(t_AB) {
    // PATCH V29: Vorher wurden bank_pieces[*].dyn_x/y/w/h rekursiv aus b_eff
    // (Modus B, "hypothetische Basis") neu berechnet - das hat die BANK
    // (das Restflächen-Reservoir) mitverzerrt, sobald am Modus-B-Regler
    // gedreht wurde. Gewünscht ist aber: die Bank bleibt IMMER in der realen,
    // unverzerrten Basis. Jedes bank_piece hat bereits seine echte, exakte
    // Geometrie in p.x/p.y/p.w/p.h (bei der Erzeugung mit der realen BASE
    // berechnet) - diese Werte werden jetzt direkt zum Zeichnen benutzt
    // (siehe project()/renderFrame() weiter unten), eine Neuberechnung ist
    // dafür gar nicht mehr nötig. updateDynamicLayout() kümmert sich daher
    // nur noch um die ZIEL-Achsenbreiten (dyn_prefA/dyn_axes_w), die weiterhin
    // von Modus B abhängen - das große Zielquadrat "atmet" mit dem Regler,
    // die Bank nicht mehr.
    if (t_AB === _lastLayoutT_AB) return;
    _lastLayoutT_AB = t_AB;

    let b_eff = Math.pow(BASE, 1.0 - t_AB);
    if (b_eff < 1.000001) b_eff = 1.000001; 
    
    dyn_prefA = [0]; dyn_axes_w = [1.0];
    let sumA = 1.0;
    for (let i = 1; i < TOTAL_STEPS; i++) {
        let val = Math.pow(b_eff, -axes[i].exp);
        dyn_prefA.push(sumA); dyn_axes_w.push(val);
        sumA += val;
    }
    // PATCH V38: Randstreifen für die "nächste Stelle" (Tiefe+1). Ohne
    // diesen Zusatz würde V_SCALE_TARGET das Ziel exakt bis zum sqrt(2)-
    // Rahmen ausfüllen und optisch "fertig" vortäuschen - dabei ist √2
    // irrational, es fehlt immer noch etwas. Der Rand hat exakt die Größe,
    // die die NÄCHSTE Ziffer-Stelle (N_MAX+1) einnehmen würde - nach
    // derselben b_eff-Formel wie jede andere Stelle berechnet. Das macht
    // den Rand konsistent mit der übrigen Darstellung: bei Modus B Richtung
    // b→1 wächst der Rand automatisch mit (dieselbe Formel wie alle
    // anderen, jetzt größer wirkenden Stellen) - "quasi-logarithmisch"
    // sichtbar, nie ganz verschwindend, aber auch nie maßstabsgetreu winzig.
    let nextDigitMargin = Math.pow(b_eff, -(N_MAX + 1));
    DYN_TARGET_W = sumA + nextDigitMargin;
}

// Step = höchste Schale S, deren Startzeit bereits erreicht ist (harter,
// ungeglätteter Wert - im Gegensatz zu getSmoothedAutoZoomExp() weiter unten,
// das für dieselbe Größe eine BEWUSST verzögerte/geglättete Version liefert).
// Von updateHUD() UND vom Auto-Zoom (renderFrame(), siehe dort) genutzt.
function getShellStepAt(time) {
    let Step = 0;
    for (let S = 1; S < GLOBAL_SHELL_START.length; S++) {
        if (time >= GLOBAL_SHELL_START[S]) Step = S; else break;
    }
    return Math.max(0, Math.min(TOTAL_STEPS - 1, Step));
}

let current_hud_hash = "";
function updateHUD(time) {
    let Step = getShellStepAt(time);
    let counts = new Array(Math.min(2 * N_MAX + 1, 50)).fill(0);
    for (let p of bank_pieces) {
        if (p.k < counts.length && time >= p.born_time && time < p.cut_time && time < p.taken_time) counts[p.k]++;
    }
    
    let hash = Step + "_" + JSON.stringify(counts) + "_" + BASE;
    if (hash === current_hud_hash) return;
    current_hud_hash = hash;
    
    // Ermittle den "echten" Iterationsschritt (m) passend zum Fragment (S)
    let current_m = axes[Step].exp;

    // === EXAKTE BIGINT-MATHEMATIK (jetzt konsistent mit dem Compiler oben) ===
    let N = 0n;
    let baseBig = BigInt(BASE);
    for(let i=0; i<=current_m; i++) {
        N = N * baseBig + BigInt(GLOBAL_N_ARR[i]);
    }
    
    // Seitenlänge P
    let P_str = N.toString(BASE).toUpperCase();
    if (current_m > 0) P_str = P_str.slice(0, 1) + "." + P_str.slice(1);

    // Fläche P^2
    let P2 = N * N;
    let P2_str = P2.toString(BASE).toUpperCase();
    if (current_m > 0) {
        let intPart = P2_str.slice(0, P2_str.length - 2*current_m);
        if (!intPart) intPart = "0";
        let fracPart = P2_str.slice(-2*current_m).padStart(2*current_m, '0');
        P2_str = intPart + "." + fracPart;
    }
    
    // Rest 2 - P^2
    // Die mathematische '2' als BigInt, verschoben um 2*m Stellen
    let two_scaled = 2n * (baseBig ** BigInt(2*current_m));
    let rem = two_scaled - P2;
    let rem_str = rem.toString(BASE).toUpperCase();
    if (current_m > 0) {
        rem_str = "0." + rem_str.padStart(2*current_m, '0');
    }
    
    // Drei Zeilen: Länge, Fläche, Rest. Die Wort-Präfixe ("Länge ", "Fläche ",
    // "Rest ") sind über NUMBER_PANEL_VERBOSE ein-/ausschaltbar (siehe Konstante
    // oben) - Standard ist kurz (nur die Symbole l/l²/R).
    let lengthLabel = NUMBER_PANEL_VERBOSE ? '\\text{Länge } l' : 'l';
    let areaLabel = NUMBER_PANEL_VERBOSE ? '\\text{Fläche } l^2' : 'l^2';
    let restLabel = NUMBER_PANEL_VERBOSE ? '\\text{Rest } R' : 'R';
    // Weder "@{...}"-Spaltentrenner noch \arraycolsep-Zuweisung werden von
    // MathJax unterstützt (beides landete als roter Fehlertext im Bild).
    // "aligned" (AMS, wird von MathJax autoload nachgeladen) ist das dafür
    // vorgesehene Werkzeug: richtet an "&" exakt aus, mit dem normalen,
    // knappen Abstand um ein Relationszeichen wie "=" - nicht dem breiten
    // array-Spaltenabstand.
    let equation = `\\[ \\begin{aligned}
        ${lengthLabel} &= ${P_str}_{${BASE}} \\\\
        ${areaLabel} &= ${P2_str}_{${BASE}} \\\\
        ${restLabel} &= ${rem_str}_{${BASE}}
    \\end{aligned} \\]`;
    numberPanelInner.innerHTML = equation;

    let inv_html = "";
    const BLOCK_CAP = 24; // ab hier wird die Bargraph-Darstellung zu einer "+N"-Kurzform verdichtet
    for (let k = 0; k < counts.length; k++) {
        let count = counts[k] || 0;
        let color = COLORS[k % COLORS.length];
        let expText = k === 0 ? "0" : `-${k}`;

        let barHtml = "";
        if (count === 0) {
            barHtml = `<div class="bank-bar" style="opacity:0.25"></div>`;
        } else if (count <= BLOCK_CAP) {
            let blocks = "";
            for (let i = 0; i < count; i++) blocks += `<div class="piece-block" style="background:${color}"></div>`;
            barHtml = `<div class="bank-bar">${blocks}</div>`;
        } else {
            // Bei sehr vielen Stücken (z.B. tiefe Rekursion, Basis>2): kompakter
            // durchgehender Balken statt hunderter einzelner Blöckchen - bleibt
            // trotzdem klar als "voller Bestand" erkennbar.
            barHtml = `<div class="bank-bar"><div style="flex-grow:1; height:10px; border-radius:2px; background:${color}"></div></div>`;
        }

        inv_html += `<div class="bank-row" style="opacity: ${count === 0 ? 0.35 : 1.0}">
            ${barHtml}
            <div class="bank-exp" style="color:${color}">${expText}</div>
        </div>`;
    }
    bankPanelInner.innerHTML = inv_html;
    // MathJax rendert asynchron - die tatsächliche (finale) Breite der Formel
    // steht erst nach Abschluss von typesetPromise() fest, daher die Skalierung
    // erst im .then() anstoßen (nicht direkt danach synchron).
    if (window.MathJax) {
        MathJax.typesetPromise([numberPanelInner]).then(updateNumberPanelScale);
    } else {
        updateNumberPanelScale();
    }
    updateBankPanelScale();
}

// Bei tiefer Rekursion (z.B. N_MAX=30, Basis 2) werden die Ziffernketten in
// der Formel so lang, dass sie die feste Breite von #numberPanel sprengen
// würden - analog zu updateBankPanelScale() daher: Inhalt in #numberPanelInner
// (eigene, freie Breite statt der festen 600px von #numberPanel - sonst
// dasselbe Messproblem wie beim Bank-Zähler) natürlich messen und bei Bedarf
// herunterskalieren. transform-origin "left top" hält dabei die linke
// Startposition der Zahlen fest (soll sich laut Vorgabe nicht verschieben).
function updateNumberPanelScale() {
    numberPanelInner.style.transform = 'none';
    let available = numberPanel.clientWidth;
    let natural = numberPanelInner.scrollWidth;
    let scale = Math.min(1, available / natural);
    numberPanelInner.style.transform = `scale(${scale})`;
}

// Bei tiefer Rekursion (viele Ziffern-Stellen, also viele Zeilen im
// Bank-Zähler) überragt die natürliche Höhe irgendwann die Fensterhöhe -
// ohne Gegenmaßnahme würden die äußersten Zeilen oben/unten aus dem
// sichtbaren Bereich laufen. Fix: Inhalt erst ungeskaliert messen, dann bei
// Bedarf gleichmäßig auf die verfügbare Höhe herunterskalieren (nie
// hochskalieren - Math.min mit 1). transform-origin "right center" (siehe
// CSS) hält dabei den rechten Rand fest, der Zähler schrumpft nach links.
//
// WICHTIG: gemessen (und skaliert) wird #bankPanelInner, NICHT #bankPanel -
// #bankPanel hat selbst eine feste Höhe (top:0/bottom:0, für die vertikale
// Zentrierung über die volle Fensterhöhe). Ein Element mit fester Höhe und
// Standard-overflow:visible liefert in scrollHeight einfach seine eigene
// (feste) Höhe zurück, NICHT die tatsächliche, überlaufende Inhaltsgröße -
// die Messung wäre also immer ≈ available und hätte nie ausgelöst.
// #bankPanelInner dagegen hat keine eigene Höhenvorgabe (wächst frei mit dem
// Inhalt), scrollHeight liefert dort zuverlässig die echte Wunschhöhe.
function updateBankPanelScale() {
    bankPanelInner.style.transform = 'none';
    let available = window.innerHeight - 40;
    let natural = bankPanelInner.scrollHeight;
    let scale = Math.min(1, available / natural);
    bankPanelInner.style.transform = `scale(${scale})`;
}

// === SYSTEM C: RENDER ENGINE ===
const canvas = document.getElementById('glCanvas'); const ctx = canvas.getContext('2d');
let isPlaying = false; let animDirection = 1; let animPause = 0;
let u_time = 0.0; let u_mode_AB = 0.0;
// Auto-Zoom: Mindestbreite (Canvas-Pixel) für die feinste Ziffern-Stelle im
// Ziel. 0 = deaktiviert. Übersteuert den Modus-B-Regler NACH OBEN (mehr
// Verzerrung/Zoom), niemals nach unten - der Regler selbst bleibt dabei
// unverändert, siehe computeAutoZoomTAB() und renderFrame().
let AUTO_ZOOM_MIN_PX = 0;

// RENDER_SCALE (Supersampling) und EDGE_BLUR_PX (Blur) waren Testkandidaten
// gegen Kanten-Flirren, sind aber nicht mehr nötig - siehe die auskommentierten
// Regler weiter unten. LINE_WIDTH_PX allein (die Subpixel-Antialiasing-
// Schwankung an einer Kante ist ~±0.5px, egal wie breit die Linie ist - bei
// dünneren Linien fällt das relativ stärker ins Gewicht) reicht bei 0.3px
// bereits für ein komplett ruhiges Bild.
let RENDER_SCALE = 1;
let EDGE_BLUR_PX = 0;
let LINE_WIDTH_PX = 0.3;

function resizeCanvas() {
    // Backing-Store in RENDER_SCALE physischen Pixeln pro CSS-Pixel, CSS-
    // Größe bleibt bei den Fenstermaßen - dadurch mehr Abtastdichte fürs
    // Antialiasing dünner Linien/Kanten (Supersampling), statt sie nur mit
    // Blur nachträglich zu kaschieren.
    canvas.width = window.innerWidth * RENDER_SCALE;
    canvas.height = window.innerHeight * RENDER_SCALE;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    updateBankPanelScale();
    renderFrame();
}
window.addEventListener('resize', resizeCanvas);

// Liefert die Auto-Zoom-Transformation der Bank für Zeitpunkt "time" -
// Zentrum UND Zoom wandern mit dem tatsächlichen Rest mit (statt eines
// festen Zentrums, das beim asymmetrisch abgebauten Rest "hängen blieb").
// Transformation pro Checkpoint: T(x) = 0.5 + (x - cx) * z, als affine
// Funktion T(x) = x*z + (0.5 - cx*z) - offsetX/offsetY sind daher schon bei
// der Konstruktion in compileSystem() vorberechnete Werte, keine cx/z-Rohdaten
// (siehe dort) - wichtig, denn NUR wenn direkt diese fertigen T(x)-Werte
// geglättet werden (statt cx und z getrennt), bleibt jeder Zwischenwert
// beweisbar eine Konvexkombination bereits sicherer Positionen (siehe
// smoothing.js: monotone Interpolation bewegt sich nie außerhalb der
// Stützwerte).
//
// Nutzt buildMonotoneSpline() (siehe smoothing.js, GLOBAL_BANK_ZOOM_SPLINE in
// compileSystem()) statt eines selbstgebauten Kerns - C¹-stetig, kein
// Nachhinken, für monoton wachsende Werte (z, area) garantiert monoton.
function getBankTransform(time) {
    if (GLOBAL_BANK_ZOOM.length === 0) return { z: 1, offsetX: 0, offsetY: 0, area: 1 };
    return GLOBAL_BANK_ZOOM_SPLINE.at(time);
}

// Auto-Zoom macht nur dynamisch Sinn: die tiefste gerade sichtbare
// Ziffern-Stelle wächst mit der Animation (Schale für Schale von exp=0 bis
// exp=N_MAX), nicht von Anfang an fix auf N_MAX. getSmoothedAutoZoomExp()
// liefert den Ziel-Exponenten für Zeitpunkt "time" - ausgewertet über
// GLOBAL_AUTO_ZOOM_SPLINE (siehe smoothing.js/compileSystem()): C¹-stetig
// UND trifft an jedem Checkpoint exakt dessen Exponenten, ohne das
// Nachhinken, das die frühere kausale Filter-Version hatte (siehe
// CLAUDE.md, "Automatisierte Parameteränderungen", und smoothing.test.js
// für den direkten Regressionstest zu diesem Bug).
function getSmoothedAutoZoomExp(time) {
    if (GLOBAL_AUTO_ZOOM_CHECKPOINTS.length === 0) return 0;
    return GLOBAL_AUTO_ZOOM_SPLINE(time);
}

// Auto-Zoom: findet den KLEINSTEN Modus-B-Wert t_AB, bei dem eine Ziffern-
// Stelle vom Exponenten targetExp mindestens thresholdPx Canvas-Pixel breit
// dargestellt wird. Reine Funktion (keine Seiteneffekte auf dyn_prefA/
// dyn_axes_w) - rechnet dieselbe Formel wie updateDynamicLayout() nach,
// aber unabhängig davon, damit die eigentliche Layout-Berechnung (mit ihrem
// Memoisierungs-Cache) nicht durch den Suchlauf gestört wird.
//
// WICHTIG: widthAt(t_AB) ist NUR für targetExp nahe N_MAX monoton wachsend
// in t_AB. Für kleine targetExp (frühe Schalen, siehe getSmoothedAutoZoomExp)
// schrumpft die Stelle anfangs sogar (das Basisquadrat wird optisch
// "verdrängt", wenn feinere Stellen aufgeblasen werden) und kann einen
// Höcker statt einer Rampe bilden - empirisch geprüft (Node-Test, siehe
// Gesprächsverlauf), keine geschlossene Formel gefunden. Deshalb bewusst
// KEINE Bisektion (setzt Monotonie voraus, liefert bei einem Höcker
// falsche/unruhige Ergebnisse), sondern ein linearer Suchlauf über 200
// Stützstellen - robust unabhängig von der Kurvenform, und mit deutlich
// unter 1ms selbst bei tiefer Rekursion (TOTAL_STEPS~500, siehe Performance-
// Test im Gesprächsverlauf) weit unter dem Frame-Budget.
//
// PATCH: der reine Grob-Raster-Treffer (Rückgabe von i/STEPS) erzeugte eine
// sichtbare Treppenstufen-Bewegung (Sprünge in 0,5%-Schritten), selbst wenn
// targetExp sich vollkommen stetig ändert (getSmoothedAutoZoomExp ist C¹-
// stetig, siehe dort) - die Quantisierung HIER war eine zweite, unabhängige
// Ruckel-Quelle. Fix: im gefundenen Intervall linear zwischen dem letzten
// "zu schmalen" und dem ersten "breit genug" Stützpunkt interpolieren,
// statt hart auf den Rasterpunkt zu springen.
//
// BEKANNTE, VERBLEIBENDE EINSCHRÄNKUNG (versucht und wieder verworfen, siehe
// Gesprächsverlauf): am genauen Moment, an dem Auto-Zoom "einschaltet"
// (widthAt(0, targetExp) kreuzt thresholdPx), bleibt ein winziger, auf ein
// sehr schmales Zeitfenster (~0.01 Zeiteinheiten in Tests) begrenzter
// Ableitungsknick - t_AB=0 ist eine harte Domänen-Grenze, an der ein
// naiver Klammer-Fix (Math.max(0, extrapolierter Rohwert)) versucht wurde,
// aber FALSCHES Vorzeichen lieferte (widthAt(t_AB) fällt bei kleinem
// targetExp anfangs, macht die lokale Steigung bei 0 vorzeichenverkehrt -
// Ergebnis liefen bis 145% statt [0,1]). Ein sauberer, vorzeichenrobuster
// Fix bräuchte eine implizite Ableitung nach targetExp statt nach t_AB -
// nicht trivial angesichts des Höckers oben. Für jetzt bewusst NICHT
// gefixt (Value bleibt korrekt/stetig, nur die Steigung springt kurz) -
// alle ANDEREN, häufigeren Ruckel-Quellen (pro Schale, ~dutzende bis
// hunderte Male) sind behoben.
function computeAutoZoomTAB(thresholdPx, scale, targetExp) {
    if (thresholdPx <= 0 || TOTAL_STEPS <= 1) return 0;
    function widthAt(t_AB) {
        let b_eff = Math.pow(BASE, 1.0 - t_AB);
        if (b_eff < 1.000001) b_eff = 1.000001;
        let sumA = 1.0;
        for (let i = 1; i < TOTAL_STEPS; i++) sumA += Math.pow(b_eff, -axes[i].exp);
        let DYN_W = sumA + Math.pow(b_eff, -(N_MAX + 1));
        let V_SCALE_TARGET = P_FINAL / DYN_W;
        return Math.pow(b_eff, -targetExp) * V_SCALE_TARGET * scale;
    }
    const STEPS = 200;
    let prevT = 0, prevWidth = widthAt(0);
    if (prevWidth >= thresholdPx) return 0;
    let bestT = 0, bestWidth = prevWidth;
    for (let i = 1; i <= STEPS; i++) {
        let t = i / STEPS;
        let w = widthAt(t);
        if (w > bestWidth) { bestWidth = w; bestT = t; }
        if (w >= thresholdPx) {
            // Lineare Interpolation zwischen (prevT, prevWidth) und (t, w) -
            // macht das Ergebnis stetig statt auf das 200er-Raster zu springen.
            let frac = (thresholdPx - prevWidth) / (w - prevWidth);
            return prevT + frac * (t - prevT);
        }
        prevT = t; prevWidth = w;
    }
    return bestT; // Ziel im gesamten [0,1]-Bereich unerreichbar - bester Kompromiss statt hartem Clamp auf 1
}

function renderFrame() {
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (render_pipeline.length === 0) return;

    // Ab hier in CSS-Pixeln rechnen (1 Einheit = 1 CSS-Pixel), auch wenn der
    // Backing-Store dank RENDER_SCALE in resizeCanvas() mehr physische
    // Pixel hat - siehe Kommentar dort.
    ctx.setTransform(RENDER_SCALE, 0, 0, RENDER_SCALE, 0, 0);
    const W = canvas.width / RENDER_SCALE;
    const H = canvas.height / RENDER_SCALE;

    const SQRT2 = Math.SQRT2;
    const LOGICAL_MAX_W = SQRT2 + 0.1 + 1.0;
    const LOGICAL_MAX_H = SQRT2;
    // Rechter Rand richtet sich NUR nach dem Bank-Zähler (feste Breite, siehe
    // CSS) - die Zahlenanzeige (#numberPanel) hat bewusst keinen Einfluss auf
    // die Render-Skala von Ziel/Rest, egal wie breit ihr Inhalt/ihre CSS-Breite
    // gerade ist (Position und Breite von #numberPanel werden unabhängig davon
    // manuell in der CSS gepflegt).
    const rightEdgeStart = bankPanel.getBoundingClientRect().left;
    const renderAreaWidth = rightEdgeStart - 40;
    const scale = Math.min(renderAreaWidth / LOGICAL_MAX_W, (H - 100) / LOGICAL_MAX_H);

    // Auto-Zoom: "größerer Wert gewinnt" - der Regler (u_mode_AB) kann die
    // Verzerrung erhöhen, Auto-Zoom kann sie ebenfalls erhöhen (falls die
    // aktuell tiefste sichtbare Stelle sonst unter AUTO_ZOOM_MIN_PX Pixel
    // fiele), aber nie verringern. Der Regler selbst bleibt dabei unverändert
    // (siehe modeSliderAB.value) - nur die tatsächlich fürs Layout benutzte
    // effektive Verzerrung wird übersteuert. Das Ziel (welcher Exponent
    // gerade "die tiefste sichtbare Stelle" ist) wandert mit der Animation
    // mit (getSmoothedAutoZoomExp) - Auto-Zoom macht nur dynamisch Sinn,
    // siehe Kommentar dort.
    //
    // getSmoothedAutoZoomExp() trifft (seit der Umstellung auf
    // buildMonotoneSpline(), siehe smoothing.js) den Exponenten jeder Schale
    // GENAU an deren Startzeit - kein Nachhinken mehr wie beim früheren
    // kausalen Filter, das hier zusätzlich einen "harten", ungeglätteten
    // Exponenten als Sicherheitsnetz brauchte (siehe smoothing.test.js und
    // auto-zoom-visibility.test.js für die Verifikation dieser Garantie).
    let autoZoomTargetExp = getSmoothedAutoZoomExp(u_time);
    let autoZoomTAB = computeAutoZoomTAB(AUTO_ZOOM_MIN_PX, scale, autoZoomTargetExp);

    let effective_t_AB = Math.max(u_mode_AB, autoZoomTAB);
    updateAutoZoomIndicator(autoZoomTAB, effective_t_AB > u_mode_AB + 1e-9);

    updateDynamicLayout(effective_t_AB);

    // PATCH V31: Zwei getrennte Skalen. V_SCALE_TARGET hängt (gewollt) von
    // Modus B ab und bestimmt nur die Größe des Zielquadrats. V_SCALE_BANK
    // ist STETS 1.0 - das entspricht mathematisch exakt dem Wert, den
    // V_SCALE bei Modus B = 0 (reale Basis) ohnehin annehmen würde (die
    // Achsenbreiten summieren sich dann exakt zu P_FINAL). Die Bank soll
    // aber unter keinen Umständen von Modus B beeinflusst werden - daher
    // hier hart auf 1.0 gesetzt, unabhängig vom Regler.
    const V_SCALE_TARGET = P_FINAL / DYN_TARGET_W;
    const V_SCALE_BANK = 1.0;

    const BANK_X_OFFSET = SQRT2 + 0.1;
    const bankT = getBankTransform(u_time);
    // Bei aktiver Kompaktierung ersetzt sie den bankT-basierten Auto-Zoom
    // vollständig (siehe project() unten) - das Zoom-Readout zeigt dann
    // konsequenterweise auch deren eigenen Zoom-Faktor statt bankT.z.
    let displayBankZoom = (COMPACTION_ENABLED && GLOBAL_COMPACTION_ZOOM_SPLINE) ? GLOBAL_COMPACTION_ZOOM_SPLINE(u_time) : bankT.z;
    bankZoomLabel.innerText = formatZoomFactor(displayBankZoom);
    bankAreaLabel.innerText = (bankT.area * 100).toLocaleString('de-DE', { maximumFractionDigits: bankT.area < 0.01 ? 4 : 1 }) + '%';

    ctx.save();
    ctx.translate(50, H - 50);
    ctx.scale(1, -1);

    // "piece" (optional, nur für isTarget=false relevant): bei aktiver
    // Kompaktierung wird darüber der gecachte Pro-Stück-Lookup
    // (GLOBAL_COMPACTION_LOOKUP, siehe compileSystem()) statt des
    // gemeinsamen bankT-Zooms verwendet - Kompaktierung ordnet jedes Stück
    // INDIVIDUELL um (keine gemeinsame affine Transformation mehr möglich,
    // siehe bank-core.js TEIL 2), x/y/w/h werden dafür nicht mehr direkt
    // gebraucht (kommen bereits fertig transformiert aus dem Lookup).
    function project(x, y, w, h, isTarget, piece) {
        if (isTarget) {
            let final_x = x * V_SCALE_TARGET;
            let final_y = y * V_SCALE_TARGET;
            let final_w = w * V_SCALE_TARGET;
            let final_h = h * V_SCALE_TARGET;
            return [final_x * scale, final_y * scale, final_w * scale, final_h * scale];
        }
        if (COMPACTION_ENABLED && piece && GLOBAL_COMPACTION_LOOKUP) {
            let r = GLOBAL_COMPACTION_LOOKUP(piece, u_time);
            let final_x = BANK_X_OFFSET + r.x * V_SCALE_BANK;
            let final_y = r.y * V_SCALE_BANK;
            let final_w = r.w * V_SCALE_BANK;
            let final_h = r.h * V_SCALE_BANK;
            return [final_x * scale, final_y * scale, final_w * scale, final_h * scale];
        }
        // Fit-to-Frame-Autozoom mit wanderndem Zentrum (siehe getBankTransform).
        // x,y,w,h sind hier die echten, unverzerrten Bank-Koordinaten (immer
        // Teilmenge von [0,1]x[0,1]). Diese Abbildung kann die Bank unter
        // keinen Umständen über das Ziel malen - bewiesen unabhängig davon,
        // wie stark sich das Zentrum zwischen zwei Checkpoints verschiebt.
        let zx = x * bankT.z + bankT.offsetX;
        let zy = y * bankT.z + bankT.offsetY;
        let zw = w * bankT.z;
        let zh = h * bankT.z;
        let final_x = BANK_X_OFFSET + zx * V_SCALE_BANK;
        // PATCH V37: Von UNTEN (y=0) statt von OBEN (SQRT2-V_SCALE_BANK)
        // verankert - damit liegt das 1x1-Basisquadrat der Bank bei Zoom=1
        // auf derselben Höhe wie das 1x1-Basisquadrat im Ziel (beide starten
        // bei y=0 und wachsen nach oben).
        let final_y = zy * V_SCALE_BANK;
        let final_w = zw * V_SCALE_BANK;
        let final_h = zh * V_SCALE_BANK;
        return [final_x * scale, final_y * scale, final_w * scale, final_h * scale];
    }

    let [t_x, t_y, t_w, t_h] = project(0, 0, SQRT2 / V_SCALE_TARGET, SQRT2 / V_SCALE_TARGET, true);
    ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.strokeRect(t_x, t_y, t_w, t_h);

    // Der äußere [0,1]x[0,1]-Rahmen der Bank hat bei aktiver Kompaktierung
    // keine feste, gemeinsame Entsprechung mehr (jedes Stück hat seine
    // eigene Transformation) - wird dann bewusst nicht gezeichnet, statt
    // einen irreführenden (nur für den UNKOMPAKTIERTEN Zustand gültigen)
    // Rahmen zu zeigen.
    if (!COMPACTION_ENABLED) {
        let [b_x, b_y, b_w, b_h] = project(0, 0, 1.0, 1.0, false);
        ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.strokeRect(b_x, b_y, b_w, b_h);
    }

    // PATCH V36: Das "1x1"-Basisquadrat (axes[0], die Ziffer "1" vor dem
    // Komma) wurde bisher nie explizit gezeichnet - die Schalen-Schleife
    // beginnt erst bei S=1, die Position (u=0,v=0) kam nie vor. Dadurch
    // startete das Ziel bei Zeit 0 leer, obwohl die Bank von Anfang an ihr
    // Wurzel-Stück zeigt - zwei ungleiche Startbilder, wo eigentlich beide
    // Seiten mit demselben "1x1"-Quadrat beginnen sollten. Dieses Quadrat
    // ist permanent (von Geburt an, verschwindet nie) Teil der Konstruktion.
    let [base_x, base_y, base_w, base_h] = project(dyn_prefA[0], dyn_prefA[0], dyn_axes_w[0], dyn_axes_w[0], true);
    ctx.fillStyle = COLORS[0];
    ctx.fillRect(base_x, base_y, base_w, base_h);

    // Alle achsenparallelen Zellrahmen werden hier in EINEM Path2D gesammelt
    // und ganz am Ende mit einem einzigen ctx.stroke()-Aufruf gezeichnet
    // (statt pro Zelle einzeln strokeRect). Grund: bei getrenntem strokeRect
    // je Zelle wird jede von zwei Nachbarzellen geteilte Kante zweimal
    // gezeichnet - einmal von jeder Seite, mit je eigener Fließkomma-
    // Rundung. Unter dem kontinuierlichen Auto-Zoom driften diese beiden
    // eigentlich identischen Koordinaten frame-für-frame um Subpixel-
    // Bruchteile auseinander, was als Geflirre/wechselnde Linienbreite
    // sichtbar wird. Ein einziger Path mit einem einzigen stroke()-Aufruf
    // rastert alle Kanten in einem Rutsch, sodass geteilte Kanten nur noch
    // einmal antialiased werden.
    const gridPath = new Path2D();
    const edgeFilter = EDGE_BLUR_PX > 0 ? `blur(${EDGE_BLUR_PX}px)` : 'none';
    gridPath.rect(base_x, base_y, base_w, base_h);

    for (let p of bank_pieces) {
        if (u_time >= p.born_time && u_time < p.cut_time && u_time < p.taken_time) {
            let [px, py, pw, ph] = project(p.x, p.y, p.w, p.h, false, p);
            if (pw < 0.2 && ph < 0.2) continue;
            ctx.fillStyle = COLORS[p.k % COLORS.length];
            ctx.fillRect(px, py, pw, ph);
            gridPath.rect(px, py, pw, ph);
        }
    }

    for (let p of render_pipeline) {
        let alpha = 1.0; let is_visible = false;

        // PATCH V34: Bugfix "Stücke liegen aufeinander". Zwei Sichtbarkeits-
        // fenster überlappten sich mit der regulären Bank-Zeichenschleife
        // (weiter oben, "for (let p of bank_pieces)") und zeichneten
        // dasselbe Stück doppelt an derselben Stelle:
        //  1) Z_direct/S_macro/R_macro waren schon 0.5 Zeiteinheiten VOR
        //     dem eigentlichen Abflug (time_fly) sichtbar, standen aber in
        //     dieser Vorlaufzeit exakt an der Bank-Position (fly_t=0) - der
        //     exakt gleichen Stelle, die die reguläre Schleife bis
        //     "taken_time" (= time_fly, ohne Versatz) ohnehin schon zeigt.
        //  2) Z_source war von der GEBURT des Stücks an sichtbar, obwohl
        //     die reguläre Schleife dasselbe Stück bis "cut_time" (mit
        //     einem -0.4-Versatz, der für die Versorgungs-Logik der Bank
        //     tatsächlich notwendig ist - siehe compileSystem) ohnehin
        //     schon zeigt.
        // Fix: beide Fenster auf die exakte Übergabe-Lücke verkleinert, die
        // die reguläre Schleife tatsächlich offen lässt - keine Änderung an
        // cut_time/taken_time selbst (das würde die Bank-Versorgung wieder
        // durcheinanderbringen, siehe Testprotokoll im Gespräch).
        if (p.type === 'Z_direct' || p.type === 'S_macro' || p.type === 'R_macro') {
            if (u_time >= p.time_fly) is_visible = true;
        } else if (p.type === 'Z_source') {
            if (u_time >= p.bp.cut_time && u_time < p.time_cut) is_visible = true;
        } else if (p.type === 'Z_ghost') {
            if (u_time >= p.time_fuse) { is_visible = true; alpha = Math.min(1, (u_time - p.time_fuse)/0.2); }
        } else if (p.type === 'Z_micro') {
            if (u_time >= p.time_cut && u_time < p.time_fuse) { 
                is_visible = true; if(u_time > p.time_fuse - 0.2) alpha = Math.max(0, (p.time_fuse - u_time)/0.2);
            } 
        }

        if (!is_visible) continue;
        
        ctx.fillStyle = COLORS[p.bp.k % COLORS.length];
        ctx.globalAlpha = alpha;

        let fly_t = Math.max(0, Math.min(1, (u_time - p.time_fly) / 0.8));
        if (p.type === 'Z_source' || p.type === 'Z_ghost') fly_t = p.type === 'Z_ghost' ? 1 : 0;
        fly_t = fly_t * fly_t * (3.0 - 2.0 * fly_t); 

        let tx = dyn_prefA[p.u]; let ty = dyn_prefA[p.v];
        let tw = dyn_axes_w[p.u]; let th = dyn_axes_w[p.v];
        let target_w = tw; let target_h = th;
        
        let b_eff = Math.pow(BASE, 1.0 - effective_t_AB);
        if (b_eff < 1.000001) b_eff = 1.000001;

        if (p.type === 'Z_micro') {
            target_w = tw > th ? tw / b_eff : tw; target_h = tw > th ? th : th / b_eff;
            tx = tx + (tw > th ? p.i * target_w : 0);
            ty = ty + (tw > th ? 0 : p.i * target_h);
        }
        // PATCH V28e: Bugfix "Rotieren"-Modus. Vorher wurde hier target_w/target_h
        // auf die Quellgröße des Bank-Stücks (p.bp.dyn_w/h) gesetzt - identisch zu
        // start_w/start_h. Damit hat sich die Größe des Stücks während des Flugs
        // NIE geändert, unabhängig davon wie groß die Zielzelle (tw, th) im
        // Raster tatsächlich war -> das Stück landete in falscher Größe, sichtbar
        // als Lücken/Überlappungen im Zielraster. Die Drehung ist ein rein
        // visueller Flug-Effekt (wie ein Spin) und darf die Zielgröße nicht
        // beeinflussen - target_w/target_h bleiben daher auf ihren korrekten
        // Default-Werten (tw, th), genau wie bei Z_direct/S_macro.

        let [start_x, start_y, start_w, start_h] = project(p.bp.x, p.bp.y, p.bp.w, p.bp.h, false, p.bp);
        let [end_x, end_y, end_w, end_h] = project(tx, ty, target_w, target_h, true);

        let px = start_x * (1 - fly_t) + end_x * fly_t;
        let py = start_y * (1 - fly_t) + end_y * fly_t;
        let pw = start_w * (1 - fly_t) + end_w * fly_t;
        let ph = start_h * (1 - fly_t) + end_h * fly_t;

        if (p.type === 'R_macro') {
            let center_x = px + pw/2; let center_y = py + ph/2;
            ctx.save();
            ctx.translate(center_x, center_y);
            ctx.rotate(p.rot * fly_t);
            ctx.fillRect(-pw/2, -ph/2, pw, ph);
            if (LINE_WIDTH_PX > 0) {
                ctx.filter = edgeFilter;
                ctx.strokeStyle = `rgba(0,0,0, ${alpha * 0.9})`; ctx.lineWidth = LINE_WIDTH_PX; ctx.strokeRect(-pw/2, -ph/2, pw, ph);
                ctx.filter = 'none';
            }
            ctx.restore();
        } else {
            if (pw > 0.2 && ph > 0.2) {
                ctx.fillRect(px, py, pw, ph);
                if (alpha >= 0.999) {
                    // Voll sichtbar & achsenparallel -> in den gemeinsamen
                    // Grid-Path, statt einzeln zu stroken (siehe Kommentar oben).
                    gridPath.rect(px, py, pw, ph);
                } else if (LINE_WIDTH_PX > 0 && (alpha > 0.8 || p.type === 'Z_ghost')) {
                    // Noch ein-/ausblendend: kein stabiler Nachbar in diesem
                    // Moment, daher unkritisch für das Flirren - eigener Stroke.
                    ctx.filter = edgeFilter;
                    ctx.strokeStyle = `rgba(0,0,0, ${alpha * 0.9})`; ctx.lineWidth = LINE_WIDTH_PX; ctx.strokeRect(px, py, pw, ph);
                    ctx.filter = 'none';
                }
            }
        }
        ctx.globalAlpha = 1.0;
    }

    // Bewusst weiche statt scharfe Kante: eine harte 1px-Linie "flirrt" unter
    // kontinuierlichem Zoom fast immer, weil ihre Antialiasing-Deckkraft an
    // der Subpixel-Position jeden Frame neu berechnet wird (mal knapp
    // schärfer, mal knapp breiter) - selbst bei nur einem Stroke-Aufruf.
    // Ein weicher Verlauf (Blur) verschiebt sich dagegen sanft statt
    // sprunghaft und ist für das Auge deutlich ruhiger.
    if (LINE_WIDTH_PX > 0) {
        ctx.save();
        ctx.filter = edgeFilter;
        ctx.strokeStyle = 'rgba(0,0,0,0.9)';
        ctx.lineWidth = LINE_WIDTH_PX;
        ctx.stroke(gridPath);
        ctx.restore();
    }

    ctx.restore();
}

// Browser stellen Formularfelder beim Neuladen oft aus der History wieder

// beim Start aus dem tatsächlichen (ggf. wiederhergestellten) Feldwert
// gelesen werden, sonst bleibt die hart kodierte 0 wirksam, bis das Feld
// einmal manuell angefasst wird.
AUTO_ZOOM_MIN_PX = parseFloat(autoZoomMinPxInput.value) || 0;

// Zeigt (falls Auto-Zoom aktiv, AUTO_ZOOM_MIN_PX > 0) eine Markierung auf dem
// Modus-B-Regler an der Stelle, ab der Auto-Zoom übersteuern würde/tut -
// löst die vom Nutzer aufgeworfene Frage "welcher Wert gilt gerade gemäß
// Regler-Position" pragmatisch: eine sichtbare Marke plus Text-Hinweis, statt
// den Regler selbst zu verschieben (der bleibt bewusst unter Nutzerkontrolle).
function updateAutoZoomIndicator(autoZoomTAB, isActive) {
    if (AUTO_ZOOM_MIN_PX <= 0) {
        autoZoomMarker.style.display = 'none';
        autoZoomNote.style.display = 'none';
        return;
    }
    autoZoomMarker.style.display = 'block';
    autoZoomMarker.style.left = (autoZoomTAB * 100) + '%';
    autoZoomNote.style.display = isActive ? 'block' : 'none';
}

function updateOutputs() {
    // Die dünne weiße Fortschrittslinie ist kein separates Div, sondern ein
    // Hart-Stop-Gradient auf dem Slider selbst (background-clip:content-box
    // in der CSS hält ihn auf die 3px-Spur beschränkt, siehe dort) - so bleibt
    // es EIN Element, das beim Hover einfach zusätzlich interaktiv wird.
    let pct = MAX_TIME > 0 ? (u_time / MAX_TIME) * 100 : 0;
    timeSlider.style.backgroundImage = `linear-gradient(to right, #fff ${pct}%, transparent ${pct}%)`;

    // Tick-Readout: zeigt zu jedem Zeitpunkt den passenden (auch gebrochenen)
    // Tick-Wert aus bank-core.js - der Bank-Zustand selbst ändert sich aber
    // immer nur an ganzzahligen Ticks. Solange das Feld nicht fokussiert ist
    // (der Nutzer also nicht gerade tippt), wird es live mitgeführt.
    if (GLOBAL_TTM && document.activeElement !== tickInput) {
        tickInput.value = Math.round(GLOBAL_TTM.timeToTick(u_time));
    }
    if (GLOBAL_TTM) {
        tickLabel.innerText = `Tick (Vergleich mit Test-Tool) — ${GLOBAL_TTM.timeToTick(u_time).toFixed(2)} / ${GLOBAL_TTM.maxTick}`;
        timeReadout.innerText = `${u_time.toFixed(1)} · ${Math.round(GLOBAL_TTM.timeToTick(u_time))}/${GLOBAL_TTM.maxTick}`;
    } else {
        timeReadout.innerText = u_time.toFixed(1);
    }
    renderFrame(); updateHUD(u_time);
}

function formatZoomFactor(f) {
    if (f < 10) return f.toLocaleString('de-DE', { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + '×';
    if (f < 1000) return Math.round(f).toLocaleString('de-DE') + '×';
    return f.toExponential(1).replace('.', ',').replace('e+', ' × 10^') + '×';
}

// Direkter Sprung zu einem Tick (springt exakt auf dessen Animationszeit via
// GLOBAL_TTM.tickToTime) - erlaubt den Zustandsvergleich mit dem Test-Tool,
// das intern nur mit Ticks arbeitet, siehe README Abschnitt 5.
tickInput.addEventListener('change', (e) => {
    if (!GLOBAL_TTM) return;
    let tick = Math.max(0, Math.min(GLOBAL_TTM.maxTick, Math.round(parseFloat(e.target.value) || 0)));
    e.target.value = tick; // Eingabe auf den tatsächlich angefahrenen (geklammerten) Tick zurückspiegeln
    u_time = GLOBAL_TTM.tickToTime(tick);

// PATCH V30: Bank-Zoom ist jetzt vollautomatisch (siehe getInterpolatedBankZoom()
// in renderFrame) - kein manueller Regler mehr, nur noch das Zahlen-Readout

// Einstellungen: kein Icon mehr - öffnet per Maus-Nähe zur oberen rechten
// Ecke, analog zum Zeitstrahl-Reveal unten. Blendet sich über Zahlen-Panel/
// Bank-Zähler ein, statt sie zu verdrängen.
const settingsPanel = document.getElementById('settingsPanel');
const TOP_RIGHT_ZONE_PX = 160;

// Zeitstrahl (inkl. Play/Pause) taucht am unteren Rand nur auf, wenn die
// Maus weit genug unten ist - für den Exponat-/Ausstellungs-Kontext gedacht,
// in dem der Regler nicht permanent im Blick sein soll.
const bottomBar = document.getElementById('bottomBar');
const BOTTOM_REVEAL_ZONE_PX = 90;
document.addEventListener('mousemove', (e) => {
    let nearBottom = window.innerHeight - e.clientY < BOTTOM_REVEAL_ZONE_PX;
    bottomBar.classList.toggle('visible', nearBottom);

    let nearTopRight = e.clientX > window.innerWidth - TOP_RIGHT_ZONE_PX
        && e.clientY < TOP_RIGHT_ZONE_PX;
    // Bugfix: die Ecken-Zone ist viel kleiner als das Panel selbst (400px
    // breit, teils >600px hoch) - sobald die Maus zum Bedienen eines Reglers
    // weiter unten/links ins Panel wandert, verlässt sie die Zone und das
    // Panel schloss sich mitten in der Interaktion, sodass sich nichts mehr
    // einstellen ließ. Fix: solange das Panel offen ist, zusätzlich prüfen,
    // ob die Maus noch irgendwo über dem tatsächlichen Panel-Rechteck steht.
    let overSettingsPanel = false;
    if (settingsPanel.classList.contains('open')) {
        let r = settingsPanel.getBoundingClientRect();
        overSettingsPanel = e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom;
    }
    settingsPanel.classList.toggle('open', nearTopRight || overSettingsPanel);
});

const pauseDurationInput = document.getElementById('pauseDurationInput');

// Baut denselben Parameter-Satz, den URL_FIELD_MAP (siehe ganz oben im
// Script) beim Laden zurückliest - Gegenstück zu den "Zustand teilen"-
// Buttons unten. modeab/time kommen NICHT aus URL_FIELD_MAP (das deckt nur
// die Compiler-Einstellungen ab), sondern direkt aus dem laufenden Zustand.
function buildStateParams() {
    let p = new URLSearchParams();
    for (let param in URL_FIELD_MAP) {
        p.set(param, document.getElementById(URL_FIELD_MAP[param]).value);
    }
    for (let param in URL_CHECKBOX_FIELD_MAP) {
        p.set(param, document.getElementById(URL_CHECKBOX_FIELD_MAP[param]).checked ? '1' : '0');
    }
    p.set('modeab', u_mode_AB.toFixed(4));
    p.set('time', u_time.toFixed(3));
    return p;
}

// Kurzes visuelles Feedback auf dem geklickten Button ("Kopiert!" für 1.2s)
// statt eines separaten Toasts - hält es einfach, reicht für die reine
// Test-/Link-Nutzung dieser Buttons.
function flashCopied(btn) {
    let original = btn.textContent;
    btn.textContent = 'Kopiert ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = original; btn.classList.remove('copied'); }, 1200);
}

document.getElementById('copyUrlBtn').addEventListener('click', (e) => {
    let url = location.origin + location.pathname + '?' + buildStateParams().toString();
    navigator.clipboard.writeText(url).then(() => flashCopied(e.target));
});
document.getElementById('copyParamsBtn').addEventListener('click', (e) => {
    navigator.clipboard.writeText(buildStateParams().toString()).then(() => flashCopied(e.target));
});

let lastTime = performance.now();
const playBtn = document.getElementById('playBtn');
playBtn.addEventListener('click', () => {
    isPlaying = !isPlaying;
    playBtn.textContent = isPlaying ? '⏸' : '▶';
    if (isPlaying) {
        // Bugfix: lastTime blieb sonst auf dem Stand des letzten Loop-Aufrufs
        // (vor der Pause) stehen. Beim Wiederstart berechnete der erste Frame
        // dt dann aus der GESAMTEN Pausendauer (oft mehrere Sekunden/Minuten)
        // - u_time sprang dadurch sofort weit über die Slider-Position hinaus
        // (meist direkt auf MAX_TIME), was wie ein Ruck aussah UND wie eine
        // ignorierte Slider-Position. Reset hier stellt sicher, dass der
        // erste Frame nach dem Start ein normal kleines dt sieht.
        lastTime = performance.now();
        requestAnimationFrame(loop);
    }
});

function loop(now) {
    if (!isPlaying) return;
    let dt = (now - lastTime) / 1000.0; lastTime = now;

    if (animPause > 0) {
        animPause -= dt;
    } else {
        u_time += dt * 2.0 * animDirection;
        if (u_time >= MAX_TIME) {
            u_time = MAX_TIME; animDirection = -1; animPause = ANIM_PAUSE_DURATION;
        } else if (u_time <= 0) {
            u_time = 0; animDirection = 1; animPause = ANIM_PAUSE_DURATION;
        }
        timeSlider.value = u_time; updateOutputs();
    }
    requestAnimationFrame(loop);
}

// URL-Parameter für die Wiedergabe-Position (siehe URL_FIELD_MAP weiter

{

        timeSlider.value = u_time;
        touched = true;
    } else if (URL_PARAMS.has('tick') && GLOBAL_TTM) {
        let tick = Math.max(0, Math.min(GLOBAL_TTM.maxTick, Math.round(parseFloat(URL_PARAMS.get('tick')) || 0)));
        u_time = GLOBAL_TTM.tickToTime(tick);
        timeSlider.value = u_time;
        touched = true;
    }
    if (touched) updateOutputs();
}
